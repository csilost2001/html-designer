<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!--
    Screen: e6147dc0-94b7-436d-ba87-d0080ac34f44 (商品検索)
    path: /products/search
    kind: search
    auth: required
    ProcessFlow (在庫照会): efa7ac6e-e295-416e-b68d-17c4739b5097

    techStack: java/spring-boot/postgresql/thymeleaf/session/docker
    生成: /generate-code スキルにより自動生成
  -->
  <title th:text="'商品検索 | リテール業務システム'">商品検索 | リテール業務システム</title>
  <link rel="stylesheet"
        th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css">
  <style>
    /* 低在庫バッジ */
    .badge-low-stock { background-color: #ffc107; color: #000; }
  </style>
</head>
<body>

<!--/* ヘッダー fragment */-->
<div th:replace="~{fragments/header :: header}"></div>

<main class="container py-4">
  <h1 class="h3 mb-4">商品検索</h1>

  <!--/* ==========================================
       検索フォーム
       items[].direction=input から展開:
         - productCode (type=string, required=false, pattern=@conv.regex.productCode)
         - storeCode   (type=string, required=true, options=[S-001/S-002/S-003])
       ========================================== */-->
  <form th:action="@{/products/search}" method="get" class="card mb-4 shadow-sm" novalidate>
    <div class="card-body">
      <div class="row g-3 align-items-end">

        <!--/* productCode: direction=input, type=string, required=false */-->
        <div class="col-12 col-md-4">
          <label for="productCode" class="form-label">商品コード</label>
          <input type="text"
                 id="productCode"
                 name="productCode"
                 class="form-control"
                 th:classappend="${fieldErrors?.productCode} ? 'is-invalid' : ''"
                 th:value="${param.productCode}"
                 placeholder="例: P-0001"
                 maxlength="20"
                 pattern="^P-\d{4,6}$"
                 th:attr="aria-describedby='productCodeHelper'">
          <!--/* helperText */-->
          <div id="productCodeHelper" class="form-text">P- で始まる 4〜6 桁の商品コードを入力してください。</div>
          <!--/* errorMessages.invalidFormat */-->
          <div class="invalid-feedback"
               th:if="${fieldErrors?.productCode}"
               th:text="${fieldErrors.productCode}">
            商品コードは P-XXXX〜P-XXXXXX 形式で入力してください。
          </div>
        </div>

        <!--/* storeCode: direction=input, type=string, required=true, options あり → <select> */-->
        <div class="col-12 col-md-4">
          <label for="storeCode" class="form-label">
            店舗
            <!--/* required=true → 必須マーク */-->
            <span class="text-danger" aria-hidden="true">*</span>
          </label>
          <select id="storeCode"
                  name="storeCode"
                  class="form-select"
                  th:classappend="${fieldErrors?.storeCode} ? 'is-invalid' : ''"
                  required
                  aria-required="true">
            <option value="">選択してください</option>
            <!--/* items[].options[] を展開 (multi-store: S-001/S-002/S-003) */-->
            <option value="S-001" th:selected="${param.storeCode == 'S-001'}">東京本店</option>
            <option value="S-002" th:selected="${param.storeCode == 'S-002'}">大阪支店</option>
            <option value="S-003" th:selected="${param.storeCode == 'S-003'}">名古屋支店</option>
          </select>
          <!--/* errorMessages.required */-->
          <div class="invalid-feedback"
               th:if="${fieldErrors?.storeCode}"
               th:text="${fieldErrors.storeCode}">
            店舗を選択してください。
          </div>
        </div>

        <!--/* searchInventoryButton: direction=output, events[id=submit] → 在庫照会ボタン */-->
        <div class="col-12 col-md-4">
          <button type="submit" class="btn btn-primary w-100">
            <span>在庫照会</span>
          </button>
        </div>

      </div>
    </div>
  </form>

  <!--/* ==========================================
       照会日時 (direction=output, valueFrom.kind=expression: @now)
       ========================================== */-->
  <p class="text-muted small mb-3"
     th:if="${inquiredAt != null}">
    照会日時:
    <span th:text="${#temporals.format(inquiredAt, 'yyyy/MM/dd HH:mm')}"></span>
  </p>

  <!--/* ==========================================
       在庫一覧 (inventoryRows, direction=viewer)
       viewDefinitionId: be4bece3-aa23-44fb-bed0-0699717e8738
       valueFrom: flowVariable (processFlowId: efa7ac6e, variableName: rows)
       ========================================== */-->
  <div th:if="${inventoryRows != null}" id="inventory-results">

    <!--/* 件数バッジ */-->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="h5 mb-0">
        検索結果
        <span class="badge bg-secondary ms-1"
              th:text="${#lists.size(inventoryRows)}">0</span>
        件
      </h2>
    </div>

    <!--/* 結果テーブル (ViewDefinition be4bece3 の列定義から展開) */-->
    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle">
        <caption class="visually-hidden">在庫検索結果一覧</caption>
        <thead class="table-dark">
          <tr>
            <!--/* ViewDefinition columns[]:
                 productCode, productName, unitPrice, quantityAvailable, storeCode */-->
            <th scope="col">商品コード</th>
            <th scope="col">商品名</th>
            <th scope="col" class="text-end">単価 (税抜)</th>
            <th scope="col" class="text-center">在庫数</th>
            <th scope="col">状態</th>
            <th scope="col">操作</th>
          </tr>
        </thead>
        <tbody>
          <!--/* 結果行 */-->
          <tr th:each="row : ${inventoryRows}">
            <td th:text="${row.productCode}"></td>
            <td th:text="${row.productName}"></td>
            <td class="text-end"
                th:text="${#numbers.formatDecimal(row.unitPrice, 0, 'COMMA', 0, 'POINT') + '円'}"></td>
            <td class="text-center" th:text="${row.quantityAvailable}"></td>
            <td>
              <!--/* 低在庫バッジ (quantityAvailable <= 5) */-->
              <span class="badge badge-low-stock"
                    th:if="${row.quantityAvailable != null and row.quantityAvailable <= 5 and row.quantityAvailable > 0}">
                低在庫
              </span>
              <!--/* 在庫切れ */-->
              <span class="badge bg-danger"
                    th:if="${row.quantityAvailable != null and row.quantityAvailable <= 0}">
                在庫切れ
              </span>
            </td>
            <td>
              <!--/* カートに追加 (→ 画面遷移 tr-search-to-cart: カート追加フロー 9515d6f6) */-->
              <form th:action="@{/cart/add}" method="post" class="d-inline">
                <input type="hidden" name="productId" th:value="${row.productId}">
                <input type="hidden" name="storeId"   th:value="${row.storeId}">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">
                <button type="submit"
                        class="btn btn-sm btn-outline-primary"
                        th:disabled="${row.quantityAvailable == null or row.quantityAvailable <= 0}">
                  カートに追加
                </button>
              </form>
            </td>
          </tr>

          <!--/* 結果 0 件メッセージ */-->
          <tr th:if="${#lists.isEmpty(inventoryRows)}">
            <td colspan="6" class="text-center text-muted py-4">
              該当する商品が見つかりませんでした。検索条件を変更してください。
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!--/* 未検索時 (初期表示) */-->
  <div th:if="${inventoryRows == null}" class="text-center text-muted py-5">
    <p>店舗を選択して「在庫照会」ボタンを押してください。</p>
  </div>

</main>

<!--/* フッター fragment */-->
<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

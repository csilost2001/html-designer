<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Windows + WSL2 + Dev Containers の構成</title>
  <desc id="desc">Windows上のVS CodeがWSL2とDocker Desktopを経由して、アプリ開発コンテナとOracle DBコンテナを利用する構成図。</desc>
  <rect width="1280" height="720" fill="#ffffff"/>
  <g font-family="Inter, 'Noto Sans JP', sans-serif">
    <text x="80" y="82" fill="#09090b" font-size="42" font-weight="700">Windows + WSL2 + Dev Containers の見え方</text>
    <text x="82" y="122" fill="#71717a" font-size="20">VM を丸ごと配るのではなく、Windows 上で Linux 実行層とコンテナを使い分ける</text>

    <rect x="70" y="165" width="1140" height="430" rx="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="105" y="210" fill="#0f172a" font-size="28" font-weight="700">Windows 11 ホスト</text>
    <text x="105" y="240" fill="#64748b" font-size="17">普段のデスクトップ、ブラウザ、Office はここで動く</text>

    <rect x="105" y="285" width="250" height="190" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="135" y="328" fill="#1d4ed8" font-size="28" font-weight="700">VS Code</text>
    <text x="135" y="360" fill="#334155" font-size="18">人間の操作画面</text>
    <text x="135" y="390" fill="#64748b" font-size="16">Remote - Containers</text>
    <text x="135" y="418" fill="#64748b" font-size="16">AI エージェントもここから</text>

    <rect x="430" y="245" width="700" height="300" rx="22" fill="#f4f4f5" stroke="#d4d4d8" stroke-width="2"/>
    <text x="465" y="288" fill="#09090b" font-size="28" font-weight="700">WSL2 / Linux 実行層</text>
    <text x="465" y="318" fill="#71717a" font-size="17">Windows 上で Linux ベースの開発環境を扱うための土台</text>

    <rect x="465" y="355" width="290" height="135" rx="16" fill="#052e16" stroke="#86efac"/>
    <text x="495" y="397" fill="#dcfce7" font-size="26" font-weight="700">App Dev Container</text>
    <text x="495" y="430" fill="#bbf7d0" font-size="17">JDK / Node / Maven 等</text>
    <text x="495" y="458" fill="#bbf7d0" font-size="17">案件ごとに完全固定</text>

    <rect x="805" y="355" width="290" height="135" rx="16" fill="#fff7ed" stroke="#fdba74"/>
    <text x="835" y="397" fill="#9a3412" font-size="26" font-weight="700">Oracle DB Container</text>
    <text x="835" y="430" fill="#7c2d12" font-size="17">開発用 DB のみ</text>
    <text x="835" y="458" fill="#7c2d12" font-size="17">本番・顧客環境には触らない</text>

    <path d="M355 380 H430" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
    <path d="M415 360 L442 380 L415 400" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="385" y="355" fill="#2563eb" font-size="16" text-anchor="middle">接続</text>

    <path d="M755 422 H805" stroke="#ea580c" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 7"/>
    <path d="M790 405 L812 422 L790 439" fill="none" stroke="#ea580c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="780" y="405" fill="#ea580c" font-size="16" text-anchor="middle">DB接続</text>

    <rect x="120" y="520" width="1030" height="52" rx="26" fill="#09090b"/>
    <text x="635" y="554" fill="#fafafa" font-size="22" font-weight="700" text-anchor="middle">開発者は VS Code を開くだけ。実行環境はコンテナ側に閉じ込める。</text>

    <rect x="140" y="620" width="1000" height="52" rx="12" fill="#fef2f2" stroke="#fecaca"/>
    <text x="170" y="653" fill="#991b1b" font-size="20" font-weight="700">VM との違い:</text>
    <text x="305" y="653" fill="#7f1d1d" font-size="20">OS 丸ごと配布ではなく、必要なミドル・ツールをイメージとして定義し、案件ごとに切り替える</text>
  </g>
</svg>

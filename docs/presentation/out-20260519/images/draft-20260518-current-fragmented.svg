<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">現状の開発環境は人間中心の形式に分断されている</title>
  <desc id="desc">SVN、Eclipse、Oracle VM、Excel設計書、Excel WBS、Excel障害管理が個別に存在し、AIエージェントからは構造化された入口が不足していることを示す図。</desc>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="80" y="82" fill="#09090b" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="42" font-weight="700">現状: 情報と環境が分断され、AI が扱える入口がない</text>
  <text x="82" y="122" fill="#71717a" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="20">SVN / Eclipse / Oracle VM / Excel 管理は、それぞれ人間作業を前提に最適化されている</text>

  <g font-family="Inter, 'Noto Sans JP', sans-serif">
    <rect x="72" y="170" width="255" height="120" rx="14" fill="#f4f4f5" stroke="#d4d4d8"/>
    <text x="102" y="218" fill="#09090b" font-size="30" font-weight="700">SVN</text>
    <text x="102" y="252" fill="#52525b" font-size="18">履歴はあるが PR / Issue と</text>
    <text x="102" y="278" fill="#52525b" font-size="18">自然につながらない</text>

    <rect x="377" y="170" width="255" height="120" rx="14" fill="#f4f4f5" stroke="#d4d4d8"/>
    <text x="407" y="218" fill="#09090b" font-size="30" font-weight="700">Eclipse</text>
    <text x="407" y="252" fill="#52525b" font-size="18">ホスト環境に依存し</text>
    <text x="407" y="278" fill="#52525b" font-size="18">AI 統合が限定的</text>

    <rect x="682" y="170" width="255" height="120" rx="14" fill="#f4f4f5" stroke="#d4d4d8"/>
    <text x="712" y="218" fill="#09090b" font-size="30" font-weight="700">Oracle VM</text>
    <text x="712" y="252" fill="#52525b" font-size="18">大きく、再配布・更新が重い</text>
    <text x="712" y="278" fill="#52525b" font-size="18">環境差分が見えない</text>

    <rect x="987" y="170" width="220" height="120" rx="14" fill="#fef2f2" stroke="#fecaca"/>
    <text x="1017" y="218" fill="#991b1b" font-size="30" font-weight="700">Excel</text>
    <text x="1017" y="252" fill="#7f1d1d" font-size="18">設計書 / WBS / 障害</text>
    <text x="1017" y="278" fill="#7f1d1d" font-size="18">暗黙ルールが多い</text>

    <line x1="200" y1="330" x2="200" y2="405" stroke="#d4d4d8" stroke-width="3" stroke-dasharray="8 8"/>
    <line x1="505" y1="330" x2="505" y2="405" stroke="#d4d4d8" stroke-width="3" stroke-dasharray="8 8"/>
    <line x1="810" y1="330" x2="810" y2="405" stroke="#d4d4d8" stroke-width="3" stroke-dasharray="8 8"/>
    <line x1="1097" y1="330" x2="1097" y2="405" stroke="#fecaca" stroke-width="3" stroke-dasharray="8 8"/>

    <rect x="130" y="415" width="1020" height="105" rx="18" fill="#09090b"/>
    <text x="640" y="468" fill="#fafafa" font-size="32" font-weight="700" text-anchor="middle">AI エージェント</text>
    <text x="640" y="502" fill="#a1a1aa" font-size="20" text-anchor="middle">作業指示・設計情報・実行環境が機械可読で揃わないと、Web チャット以上には進みにくい</text>

    <path d="M190 580 H1090" stroke="#ea580c" stroke-width="4" stroke-linecap="round"/>
    <circle cx="190" cy="580" r="9" fill="#ea580c"/>
    <circle cx="1090" cy="580" r="9" fill="#ea580c"/>
    <text x="640" y="626" fill="#09090b" font-size="25" font-weight="700" text-anchor="middle">共通課題: ツールが人間しか扱えない形式で情報を持っている</text>
  </g>
</svg>

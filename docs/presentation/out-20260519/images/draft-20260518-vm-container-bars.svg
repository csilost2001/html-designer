<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">VMとコンテナのリソース比較</title>
  <desc id="desc">取得サイズ、起動時間、実行時RAMについて、VMとコンテナを比較する横棒グラフ。</desc>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="80" y="82" fill="#09090b" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="42" font-weight="700">VM からコンテナへ: 重い配布物から再現可能な定義へ</text>
  <text x="82" y="122" fill="#71717a" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="20">数値は調査時点の代表値。契約・費用判断ではなく、技術比較の材料として提示</text>

  <g font-family="Inter, 'Noto Sans JP', sans-serif">
    <text x="115" y="205" fill="#09090b" font-size="24" font-weight="700">初回取得サイズ</text>
    <rect x="310" y="178" width="650" height="34" rx="17" fill="#fef2f2"/>
    <rect x="310" y="178" width="620" height="34" rx="17" fill="#b91c1c"/>
    <text x="950" y="203" fill="#991b1b" font-size="21" font-weight="700">VM 12.6 GB</text>
    <rect x="310" y="225" width="246" height="34" rx="17" fill="#15803d"/>
    <text x="575" y="250" fill="#166534" font-size="21" font-weight="700">Container 4.6 GB</text>
    <rect x="310" y="272" width="54" height="34" rx="17" fill="#84cc16"/>
    <text x="385" y="297" fill="#3f6212" font-size="21" font-weight="700">Lite 0.8-1 GB</text>

    <text x="115" y="382" fill="#09090b" font-size="24" font-weight="700">起動時間</text>
    <rect x="310" y="355" width="560" height="34" rx="17" fill="#b91c1c"/>
    <text x="895" y="380" fill="#991b1b" font-size="21" font-weight="700">VM 数分</text>
    <rect x="310" y="402" width="88" height="34" rx="17" fill="#15803d"/>
    <text x="420" y="427" fill="#166534" font-size="21" font-weight="700">Container 数秒</text>

    <text x="115" y="559" fill="#09090b" font-size="24" font-weight="700">実行時 RAM</text>
    <rect x="310" y="532" width="480" height="34" rx="17" fill="#b91c1c"/>
    <text x="815" y="557" fill="#991b1b" font-size="21" font-weight="700">VM 4-8 GB</text>
    <rect x="310" y="579" width="240" height="34" rx="17" fill="#15803d"/>
    <text x="575" y="604" fill="#166534" font-size="21" font-weight="700">Container 2-4 GB</text>

    <rect x="925" y="498" width="250" height="92" rx="16" fill="#f4f4f5" stroke="#d4d4d8"/>
    <text x="1050" y="535" fill="#09090b" font-size="23" font-weight="700" text-anchor="middle">本質はサイズより</text>
    <text x="1050" y="566" fill="#09090b" font-size="23" font-weight="700" text-anchor="middle">環境定義の再現性</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">期待される効果</title>
  <desc id="desc">新人オンボード時間、テスト工数、仕様実装ズレ、ナレッジ蓄積の4つの期待効果を示す図。</desc>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="80" y="82" fill="#09090b" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="42" font-weight="700">期待効果: 速さよりも、再現性と追跡性を上げる</text>
  <text x="82" y="122" fill="#71717a" font-family="Inter, 'Noto Sans JP', sans-serif" font-size="20">数値は調査ベースの目安。実効果は社内のPoCと運用で計測する</text>

  <g font-family="Inter, 'Noto Sans JP', sans-serif">
    <rect x="95" y="185" width="250" height="250" rx="22" fill="#f4f4f5" stroke="#d4d4d8"/>
    <text x="220" y="260" fill="#09090b" font-size="34" font-weight="700" text-anchor="middle">数日</text>
    <text x="220" y="310" fill="#ea580c" font-size="52" font-weight="800" text-anchor="middle">→</text>
    <text x="220" y="365" fill="#09090b" font-size="34" font-weight="700" text-anchor="middle">数十分</text>
    <text x="220" y="405" fill="#71717a" font-size="18" text-anchor="middle">オンボード</text>

    <rect x="395" y="185" width="250" height="250" rx="22" fill="#f4f4f5" stroke="#d4d4d8"/>
    <text x="520" y="285" fill="#09090b" font-size="60" font-weight="800" text-anchor="middle">40%</text>
    <text x="520" y="330" fill="#71717a" font-size="20" text-anchor="middle">テスト工数削減</text>
    <text x="520" y="365" fill="#71717a" font-size="17" text-anchor="middle">AI自動生成の事例ベース</text>

    <rect x="695" y="185" width="250" height="250" rx="22" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="820" y="285" fill="#9a3412" font-size="48" font-weight="800" text-anchor="middle">ズレ</text>
    <text x="820" y="340" fill="#9a3412" font-size="48" font-weight="800" text-anchor="middle">最小化</text>
    <text x="820" y="385" fill="#7c2d12" font-size="17" text-anchor="middle">JSON原本 + 機械検証</text>

    <rect x="995" y="185" width="190" height="250" rx="22" fill="#09090b"/>
    <text x="1090" y="280" fill="#fafafa" font-size="32" font-weight="800" text-anchor="middle">記録が</text>
    <text x="1090" y="325" fill="#fafafa" font-size="32" font-weight="800" text-anchor="middle">資産化</text>
    <text x="1090" y="375" fill="#a1a1aa" font-size="17" text-anchor="middle">Issue / PR</text>
    <text x="1090" y="400" fill="#a1a1aa" font-size="17" text-anchor="middle">Knowledge base</text>

    <rect x="185" y="520" width="910" height="74" rx="37" fill="#f4f4f5" stroke="#d4d4d8"/>
    <text x="640" y="565" fill="#09090b" font-size="26" font-weight="700" text-anchor="middle">個人の頑張りに依存した開発から、仕組みで再現できる開発へ</text>
  </g>
</svg>

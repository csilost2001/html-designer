server.port=8080
spring.thymeleaf.cache=false
spring.application.name=retail-thymeleaf

# UTF-8 encoding for response (日本語文字化け回避)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.thymeleaf.encoding=UTF-8

# #1035 S-6: デモ用 InMemoryUserDetailsManager は @Profile("dev") 限定。
# 本番 deploy 時は SPRING_PROFILES_ACTIVE=prod 等に切替え、別 UserDetailsService Bean
# (JdbcUserDetailsManager / OAuth2 / LDAP 等) を SecurityConfig#prodUserDetailsService 等で提供すること。
spring.profiles.active=dev

# Demo session attributes are hardcoded in CommonModelAdvice
# (application.properties uses ISO-8859-1 in Spring Boot's PropertiesPropertySourceLoader,
#  so Japanese values are kept in Java source which is UTF-8)

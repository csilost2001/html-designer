server.port=8080
spring.thymeleaf.cache=false
spring.application.name=retail-thymeleaf

# UTF-8 encoding for response (日本語文字化け回避)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.thymeleaf.encoding=UTF-8

# Demo session attributes are hardcoded in CommonModelAdvice
# (application.properties uses ISO-8859-1 in Spring Boot's PropertiesPropertySourceLoader,
#  so Japanese values are kept in Java source which is UTF-8)

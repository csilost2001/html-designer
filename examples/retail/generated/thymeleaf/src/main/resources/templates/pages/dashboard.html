<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}"
      lang="ja">
<head>
  <title>ダッシュボード | Harmony Retail</title>
</head>
<body>

<!--
  Screen: 765c3c23-8a0e-46b0-ae8b-ce84d10be0b0
  name: ダッシュボード
  kind: dashboard
  purpose: page
  pageLayoutId: 17595b62-fef1-4b22-9c25-16736c772567 (Main Layout)
  Generated by Harmony /generate-code (RFC #1021 pl-7)
-->
<th:block layout:fragment="layout-content">

  <h1 class="mb-4">ダッシュボード</h1>

  <div class="row g-4 mb-4">
    <div class="col-md-4">
      <div class="card text-bg-primary">
        <div class="card-body">
          <h6 class="card-title">本日の売上</h6>
          <p class="card-text display-6"
             th:text="${dailySales != null} ? ${#numbers.formatDecimal(dailySales, 0, 'COMMA', 0, 'POINT')} + '円' : '---'">---</p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card text-bg-success">
        <div class="card-body">
          <h6 class="card-title">本日の注文数</h6>
          <p class="card-text display-6"
             th:text="${dailyOrderCount != null} ? ${dailyOrderCount} + '件' : '---'">---</p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card text-bg-warning">
        <div class="card-body">
          <h6 class="card-title">低在庫商品数</h6>
          <p class="card-text display-6"
             th:text="${lowStockCount != null} ? ${lowStockCount} + '品' : '---'">---</p>
        </div>
      </div>
    </div>
  </div>

  <h2 class="h5 mb-3">最近の注文</h2>
  <div class="table-responsive">
    <table class="table table-striped table-hover align-middle">
      <thead class="table-dark">
        <tr>
          <th>注文番号</th>
          <th>顧客名</th>
          <th>金額</th>
          <th>ステータス</th>
          <th>注文日時</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="order : ${recentOrders}">
          <td th:text="${order.orderId}"></td>
          <td th:text="${order.customerName}"></td>
          <td th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + '円'"></td>
          <td><span class="badge bg-secondary" th:text="${order.status}"></span></td>
          <td th:text="${order.orderedAt}"></td>
        </tr>
        <tr th:if="${recentOrders == null or recentOrders.isEmpty()}">
          <td colspan="5" class="text-center text-muted">注文データがありません。</td>
        </tr>
      </tbody>
    </table>
  </div>

</th:block>

</body>
</html>

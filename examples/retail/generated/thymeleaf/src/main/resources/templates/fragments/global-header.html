    <span class="navbar-brand mb-0">Harmony Retail</span>

          th:text="${storeName != null} ? ${storeName} : '店舗未選択'">店舗</span>

    <span class="text-white"
          th:text="${userName != null} ? (${userName} + ' さん') : 'ゲスト さん'">ゲスト さん</span>
    <form th:action="@{/api/retail/auth/logout}" method="post" class="m-0">
      <button type="submit" class="btn btn-outline-light btn-sm">ログアウト</button>
    </form>
  </div>
</div>

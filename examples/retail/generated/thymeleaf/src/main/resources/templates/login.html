<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン | Harmony Retail Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <!--
    techStack.auth.method=session 時の form login 画面 (#1035 D)
    Generated by Harmony /generate-code.
  -->
  <div class="container py-5" style="max-width: 400px;">
    <h1 class="h4 mb-3">ログイン</h1>
    <div th:if="${param.error}" class="alert alert-danger" role="alert">
      ユーザー名またはパスワードが正しくありません。
    </div>
    <div th:if="${param.logout}" class="alert alert-info" role="alert">
      ログアウトしました。
    </div>
    <form th:action="@{/login}" method="post">
      <div class="mb-3">
        <label for="username" class="form-label">ユーザー名</label>
        <input type="text" id="username" name="username" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">パスワード</label>
        <input type="password" id="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">ログイン</button>
    </form>
    <!-- #1035 S-6: デモアカウント表示は dev profile 限定。本番 (spring.profiles.active=prod)
         起動時はこの段落が非表示になり、login 画面に demo credential が露出しない。 -->
    <p class="text-muted small mt-3 text-center"
       th:if="${@environment.acceptsProfiles('dev')}">
      <!-- デモ用固定ユーザー (SecurityConfig.demoUserDetailsService、dev profile 限定) -->
      デモアカウント: <code>demo</code> / <code>demo</code>
    </p>
  </div>
</body>
</html>
